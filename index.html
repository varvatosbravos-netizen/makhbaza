<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" id="meta-theme" content="#BA7517">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="مخبزتي">
<title>مخبزتي</title>
<script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleAuth()"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* --- THEME SYSTEM --- */
:root {
  --A:#BA7517;--AL:#FAEEDA;--AM:#FAC775;--AD:#633806;--AX:#412402;
  --T:#1D9E75;--TL:#E1F5EE;--TM:#9FE1CB;--TD:#085041;
  --CL:#FAECE7;--CD:#4A1B0C;
  --GL:#EAF3DE;--GD:#27500A;
  --PL:#EEEDFE;--PD:#3C3489;
  --bg:#fff;--bg2:#f5f4f0;--bg3:#ede9e0;
  --br:#e0ddd5;--br2:#ccc9c0;
  --tx:#1a1917;--tx2:#6b6860;--tx3:#9c9990;
  --r:10px;--rl:14px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)
}
:root[data-theme="dark"] {
  --bg:#1c1b18;--bg2:#252420;--bg3:#2e2c27;--br:#38362f;--br2:#4a473e;
  --tx:#f0ede6;--tx2:#a09d96;--tx3:#6b6860;
  --AL:#2a2010;--AM:#5c3d0a;--AD:#FAC775;--AX:#FAEEDA;
  --TL:#0a2018;--TM:#0f4a30;--TD:#9FE1CB;
  --CL:#2a1208;--CD:#F0997B;--GL:#111f08;--GD:#C0DD97;--PL:#1a1940;--PD:#AFA9EC;
}
@media(prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg:#1c1b18;--bg2:#252420;--bg3:#2e2c27;--br:#38362f;--br2:#4a473e;
    --tx:#f0ede6;--tx2:#a09d96;--tx3:#6b6860;
    --AL:#2a2010;--AM:#5c3d0a;--AD:#FAC775;--AX:#FAEEDA;
    --TL:#0a2018;--TM:#0f4a30;--TD:#9FE1CB;
    --CL:#2a1208;--CD:#F0997B;--GL:#111f08;--GD:#C0DD97;--PL:#1a1940;--PD:#AFA9EC;
  }
}

html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--tx);font-size:16px;transition:background-color 0.2s, color 0.2s}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.topbar{background:var(--bg);border-bottom:1px solid var(--br);padding:10px 16px 9px;padding-top:calc(10px + var(--st));flex-shrink:0;display:flex;align-items:center;justify-content:space-between;transition:background-color 0.2s}
.tb-logo{font-size:18px;font-weight:700;color:var(--A)}
.tb-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.tb-ca-val{font-size:17px;font-weight:700;color:var(--A);text-align:left}
.tb-ca-lbl{font-size:10px;color:var(--tx2);text-align:left}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.screen{display:none;padding:12px 14px 20px;animation:fi .15s ease}
.screen.on{display:block}
@keyframes fi{from{opacity:.5;transform:translateY(3px)}to{opacity:1;transform:none}}
.nav{background:var(--bg);border-top:1px solid var(--br);display:flex;flex-shrink:0;padding-bottom:var(--sb);transition:background-color 0.2s}
.nb{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--tx2);font-size:9px;font-family:inherit;transition:color .15s;position:relative;min-width:0}
.nb.on{color:var(--A)}
.nb.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--A);border-radius:0 0 2px 2px}
.nb svg{width:20px;height:20px;stroke-width:1.8}
.slbl{font-size:11px;color:var(--tx2);letter-spacing:.06em;margin:16px 0 8px;font-weight:600;text-transform:uppercase}
.card{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:14px;margin-bottom:10px;transition:background-color 0.2s}
.card-flat{background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px;transition:background-color 0.2s}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.met{background:var(--bg2);border-radius:var(--r);padding:10px 12px;transition:background-color 0.2s}
.met-lbl{font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:600}
.met-val{font-size:21px;font-weight:700;color:var(--tx);line-height:1}
.met-sub{font-size:11px;color:var(--tx2);margin-top:3px}
.fg{margin-bottom:12px}
.fl{font-size:13px;color:var(--tx2);margin-bottom:5px;display:block;font-weight:500}
input[type=text],input[type=number],input[type=time],select{
  width:100%;padding:11px 13px;border:1px solid var(--br2);border-radius:var(--r);
  background:var(--bg);color:var(--tx);font-size:15px;font-family:inherit;
  direction:rtl;-webkit-appearance:none;appearance:none;transition:all .15s
}
input:focus,select:focus{outline:none;border-color:var(--A);box-shadow:0 0 0 3px color-mix(in srgb,var(--A) 14%,transparent)}
input[type=number]{text-align:center}
.btn{width:100%;padding:12px;border-radius:var(--r);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98);opacity:.85}
.btn-p{background:var(--A);color:#fff}
.btn-s{background:var(--bg2);color:var(--tx);border:1px solid var(--br2)}
.btn-d{background:var(--CL);color:#993C1D;border:1px solid #F0997B}
.btn-g{background:#4285f4;color:#fff}
.btn-teal{background:var(--TL);color:var(--TD);border:1px solid var(--TM)}
.btn-sm{width:auto;padding:7px 14px;font-size:13px;border-radius:8px}
.pills{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--br2);background:var(--bg2);color:var(--tx2);font-weight:500;transition:all .15s}
.pill.on{background:var(--AL);color:var(--AD);border-color:var(--AM)}
.ditem{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--br)}
.ditem:last-child{border-bottom:none}
.ddot{width:8px;height:8px;border-radius:50%;background:var(--AM);flex-shrink:0}
.dinfo{flex:1;min-width:0}
.dval{font-size:14px;font-weight:600;color:var(--tx)}
.dmeta{font-size:12px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dtime{font-size:13px;color:var(--AD);font-weight:600;white-space:nowrap}
.pitem{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--br);cursor:pointer}
.pitem:last-child{border-bottom:none}
.pav{width:38px;height:38px;border-radius:50%;background:var(--AL);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--AD);flex-shrink:0}
.bdg{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.bdg-a{background:var(--AL);color:var(--AD)}
.bdg-t{background:var(--TL);color:var(--TD)}
.bdg-g{background:var(--GL);color:var(--GD)}
.bdg-p{background:var(--PL);color:var(--PD)}
.bdg-r{background:var(--CL);color:#993C1D}
.alrt{padding:11px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;line-height:1.5}
.alrt-s{background:var(--TL);color:var(--TD);border:1px solid var(--TM)}
.alrt-w{background:var(--AL);color:var(--AD);border:1px solid var(--AM)}
.alrt-e{background:var(--CL);color:#993C1D;border:1px solid #F0997B}
.sum-box{background:var(--AL);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--AD)}
.sum-total{font-size:16px;font-weight:700;border-top:1px solid var(--AM);margin-top:6px;padding-top:8px;color:var(--AX)}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.tcard{background:var(--bg2);border-radius:var(--r);padding:11px 10px;border:1px solid var(--br);text-align:center}
.tcard-nm{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:2px}
.tcard-pr{font-size:11px;color:var(--tx2);margin-bottom:7px}
.bbar{margin:5px 0}
.bbar-head{display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);margin-bottom:3px}
.btrack{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bfill{height:100%;background:var(--AM);border-radius:4px;transition:width .5s}
.bfill-t{background:var(--TM)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--A);cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;padding:0 0 14px}
.best-time{background:var(--AL);border-radius:var(--r);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.icon-btn{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:18px;padding:6px;line-height:1;border-radius:8px;transition:background .15s}
.icon-btn:active{background:var(--bg3)}
.dtag{display:inline-flex;align-items:center;gap:3px;font-size:11px;background:var(--TL);color:var(--TD);padding:2px 8px;border-radius:20px;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .15s ease}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px;padding-bottom:calc(20px + var(--sb));max-height:90vh;overflow-y:auto;transition:background-color 0.2s}
.modal-handle{width:40px;height:4px;background:var(--br2);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}
.hrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--br);font-size:13px}
.hrow:last-child{border-bottom:none}
.empty{text-align:center;padding:36px 20px;color:var(--tx2);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:400;white-space:nowrap;animation:toastIn .2s ease;pointer-events:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.srow{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--br)}
.srow:last-child{border-bottom:none}
.srow-lbl{font-size:14px;font-weight:500;color:var(--tx)}
.srow-sub{font-size:12px;color:var(--tx2);margin-top:2px}
.switch{width:48px;height:27px;background:var(--br2);border-radius:14px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.switch.on{background:var(--A)}
.switch::after{content:'';position:absolute;top:3px;right:3px;width:21px;height:21px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on::after{transform:translateX(-21px)}
.sync-status{display:flex;align-items:center;gap:7px;font-size:13px;padding:10px 14px;border-radius:var(--r);margin-bottom:12px}
.sync-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sync-ok{background:var(--TL);color:var(--TD)}
.sync-dot-ok{background:var(--T)}
.sync-err{background:var(--CL);color:#993C1D}
.sync-dot-err{background:#D85A30}
.sync-pending{background:var(--AL);color:var(--AD)}
.sync-dot-pending{background:var(--A);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.settle-card{background:var(--bg);border:2px solid var(--A);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.settle-hero{text-align:center;padding:16px 0 10px}
.settle-hero-amount{font-size:36px;font-weight:700;color:var(--A);line-height:1}
.settle-hero-lbl{font-size:13px;color:var(--tx2);margin-top:4px}
.settle-period{background:var(--bg2);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--tx2);text-align:center}
.settle-period strong{color:var(--tx);font-size:14px}
.settle-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.settle-box{background:var(--bg2);border-radius:var(--r);padding:10px 8px;text-align:center}
.settle-box-val{font-size:20px;font-weight:700;color:var(--tx)}
.settle-box-lbl{font-size:11px;color:var(--tx2);margin-top:3px}
.settle-box.green .settle-box-val{color:var(--T)}
.settle-box.red .settle-box-val{color:#D85A30}
.debt-banner{border-radius:var(--r);padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.debt-banner.has-debt{background:var(--CL);border:1px solid #F0997B}
.debt-banner.no-debt{background:var(--TL);border:1px solid var(--TM)}
.settle-hist-item{padding:12px 0;border-bottom:1px solid var(--br)}
.settle-hist-item:last-child{border-bottom:none}
.settle-hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.settle-hist-date{font-size:14px;font-weight:700;color:var(--tx)}
.settle-hist-period{font-size:11px;color:var(--tx2);margin-bottom:5px}
.settle-hist-detail{display:flex;gap:8px;flex-wrap:wrap}
.theme-pills{display:flex;gap:8px;justify-content:center}
.theme-pill{flex:1;padding:10px 6px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid var(--br2);background:var(--bg2);color:var(--tx2);font-weight:500;text-align:center;transition:all .15s}
.theme-pill.on{background:var(--AL);color:var(--AD);border-color:var(--AM)}
.balance-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--br);font-size:13px}
.balance-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <div class="tb-logo">🍞 مخبزتي</div>
      <div class="tb-sub" id="tb-date"></div>
    </div>
    <div>
      <div class="tb-ca-val" id="tb-ca">—</div>
      <div class="tb-ca-lbl">رقم المعاملات اليوم</div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="screen on" id="scr-home"></div>
    <div class="screen" id="scr-deliv"></div>
    <div class="screen" id="scr-pts"></div>
    <div class="screen" id="scr-stats"></div>
    <div class="screen" id="scr-settings"></div>
  </div>
  <nav class="nav">
    <button class="nb on" onclick="go('home')" id="n-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
      الرئيسية
    </button>
    <button class="nb" onclick="go('deliv')" id="n-deliv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      تسليم
    </button>
    <button class="nb" onclick="go('pts')" id="n-pts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      النقاط
    </button>
    <button class="nb" onclick="go('stats')" id="n-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      الإحصاء
    </button>
    <button class="nb" onclick="go('settings')" id="n-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      الإعدادات
    </button>
  </nav>
</div>

<script>
// ═══════════════════════════════════════════════
//  SVG BREAD IMAGES
// ═══════════════════════════════════════════════
const BSVG = {
  sha3ir_k:`<svg width="64" height="64" viewBox="0 0 72 72" fill="none"><ellipse cx="36" cy="40" rx="28" ry="14" fill="#8B5E3C" opacity=".18"/><ellipse cx="36" cy="37" rx="26" ry="18" fill="#C8874A"/><ellipse cx="36" cy="35" rx="24" ry="16" fill="#D9995A"/><ellipse cx="36" cy="34" rx="22" ry="14" fill="#E8AB6A"/><ellipse cx="36" cy="33" rx="20" ry="12" fill="#F0BC7A"/><path d="M18 30 Q24 20 36 19 Q48 20 54 30" stroke="#C8874A" stroke-width="1.5" fill="none" opacity=".6"/><path d="M22 34 Q28 26 36 25 Q44 26 50 34" stroke="#BC7840" stroke-width="1" fill="none" opacity=".4"/><text x="36" y="60" font-size="10" fill="#8B5E3C" text-anchor="middle" font-weight="600" opacity=".8">شعير ك</text></svg>`,
  sha3ir_s:`<svg width="64" height="64" viewBox="0 0 72 72" fill="none"><ellipse cx="36" cy="42" rx="20" ry="10" fill="#8B5E3C" opacity=".18"/><ellipse cx="36" cy="39" rx="18" ry="12" fill="#C8874A"/><ellipse cx="36" cy="38" rx="16" ry="11" fill="#D9995A"/><ellipse cx="36" cy="37" rx="14" ry="9" fill="#E8AB6A"/><ellipse cx="36" cy="36" rx="12" ry="7.5" fill="#F0BC7A"/><path d="M24 34 Q30 27 36 26 Q42 27 48 34" stroke="#C8874A" stroke-width="1.2" fill="none" opacity=".5"/><text x="36" y="57" font-size="9.5" fill="#8B5E3C" text-anchor="middle" font-weight="600" opacity=".8">شعير ص</text></svg>`,
  dra:`<svg width="64" height="64" viewBox="0 0 72 72" fill="none"><ellipse cx="36" cy="40" rx="28" ry="14" fill="#8B6800" opacity=".15"/><ellipse cx="36" cy="37" rx="26" ry="18" fill="#C8960A"/><ellipse cx="36" cy="35" rx="24" ry="16" fill="#D9A81A"/><ellipse cx="36" cy="34" rx="22" ry="14" fill="#E8BA2A"/><ellipse cx="36" cy="33" rx="20" ry="12" fill="#F5CC40"/><path d="M18 30 Q24 20 36 19 Q48 20 54 30" stroke="#C8960A" stroke-width="1.5" fill="none" opacity=".55"/><text x="36" y="60" font-size="10" fill="#8B6800" text-anchor="middle" font-weight="600" opacity=".8">ذرة</text></svg>`,
  qmh:`<svg width="64" height="64" viewBox="0 0 72 72" fill="none"><ellipse cx="36" cy="40" rx="28" ry="14" fill="#6B5030" opacity=".15"/><ellipse cx="36" cy="37" rx="26" ry="18" fill="#A8784A"/><ellipse cx="36" cy="35" rx="24" ry="16" fill="#BA8A5C"/><ellipse cx="36" cy="34" rx="22" ry="14" fill="#CC9C6E"/><ellipse cx="36" cy="33" rx="20" ry="12" fill="#DCAD80"/><path d="M20 29 Q26 22 36 21 Q46 22 52 29" stroke="#A8784A" stroke-width="1.5" fill="none" opacity=".6"/><text x="36" y="60" font-size="10" fill="#6B5030" text-anchor="middle" font-weight="600" opacity=".8">قمح</text></svg>`
};
const BSVG_SM = k => BSVG[k].replace('width="64"','width="40"').replace('height="64"','height="40"');

//  CONSTANTS
// ═══════════════════════════════════════════════
const TK = ['sha3ir_k','sha3ir_s','dra','qmh'];
const TM = {
  sha3ir_k:{label:'شعير كبير', short:'ش.ك', bdg:'bdg-a', note:''},
  sha3ir_s:{label:'شعير صغير',short:'ش.ص', bdg:'bdg-a', note:'جوج = كبيرة'},
  dra:     {label:'ذرة كبير',  short:'ذ.ك', bdg:'bdg-g', note:''},
  qmh:     {label:'قمح كبير', short:'ق.ك', bdg:'bdg-t', note:''}
};
const DP = {sha3ir_k:2.50, sha3ir_s:1.25, dra:2.50, qmh:2.50};
const TODAY = new Date().toISOString().split('T')[0];

let tokenClient = null;

function ei(){return {sha3ir_k:'',sha3ir_s:'',dra:'',qmh:''}}
function nstr(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes())}
function pad(n){return String(n).padStart(2,'0')}
function dl(d){const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fdate(d){
  const D=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const Mo=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const dt=new Date(d+'T12:00:00');
  return D[dt.getDay()]+' '+dt.getDate()+' '+Mo[dt.getMonth()]+' '+dt.getFullYear();
}

// ═══════════════════════════════════════════════
//  PRICING HELPERS
// ═══════════════════════════════════════════════
function gpr(ptId){const pt=S.points.find(p=>p.id===ptId);return {...DP,...(pt?.prices||{})}}
function cval(items,ptId){const pr=gpr(ptId);return TK.reduce((s,k)=>s+(parseInt(items[k])||0)*pr[k],0)}
function fmtI(items){return TK.filter(k=>parseInt(items[k])>0).map(k=>`${items[k]} ${TM[k].short}`).join(' · ')}
function hasI(items){return TK.some(k=>parseInt(items[k])>0)}
function gd(ptId,date){return S.deliveries.filter(d=>d.ptId===ptId&&d.date===date)}
function gl(ptId,date){return S.leftovers.find(l=>l.ptId===ptId&&l.date===date)||null}
function ptNet(ptId,date){
  const t=gd(ptId,date).reduce((s,d)=>s+cval(d.items,ptId),0);
  const l=gl(ptId,date);return t-(l?cval(l.items,ptId):0);
}
function todayCA(){
  const t=S.deliveries.filter(d=>d.date===TODAY).reduce((s,d)=>s+cval(d.items,d.ptId),0);
  const l=S.leftovers.filter(l=>l.date===TODAY).reduce((s,l)=>s+cval(l.items,l.ptId),0);
  return t-l;
}
function btTime(ptId){
  const ds=S.deliveries.filter(d=>d.ptId===ptId);if(ds.length<2)return null;
  const h={};ds.forEach(d=>{const hr=d.time.split(':')[0];h[hr]=(h[hr]||0)+cval(d.items,ptId)});
  const b=Object.entries(h).sort((a,b)=>b[1]-a[1])[0];return b?b[0]+':00':null;
}
function sByDay(ptId){
  const days={};
  S.deliveries.filter(d=>d.ptId===ptId).forEach(d=>{days[d.date]=(days[d.date]||0)+cval(d.items,ptId)});
  S.leftovers.filter(l=>l.ptId===ptId).forEach(l=>{if(days[l.date])days[l.date]-=cval(l.items,ptId)});
  return Object.entries(days).sort((a,b)=>a[0]>b[0]?-1:1).slice(0,10);
}

// ═══════════════════════════════════════════════
//  SETTLEMENT HELPERS
// ═══════════════════════════════════════════════
function lastSettleDate(ptId){
  const all=S.settlements.filter(s=>s.ptId===ptId).sort((a,b)=>a.date>b.date?-1:1);
  return all.length>0 ? all[0].dateTo : null;
}
function ptDebt(ptId){
  const totalDelivered = S.deliveries.filter(d=>d.ptId===ptId).reduce((s,d)=>s+cval(d.items,ptId),0);
  const totalLeftover  = S.leftovers.filter(l=>l.ptId===ptId).reduce((s,l)=>s+cval(l.items,ptId),0);
  const totalNet = totalDelivered - totalLeftover;
  const totalPaid = S.settlements.filter(s=>s.ptId===ptId).reduce((s,st)=>s+st.paid,0);
  return Math.max(0, totalNet - totalPaid);
}
function calcSettlement(ptId){
  const lastSt = lastSettleDate(ptId);
  const allDelivDates = S.deliveries.filter(d=>d.ptId===ptId).map(d=>d.date).sort();
  if(!allDelivDates.length) return null;

  const periodStart = lastSt
    ? allDelivDates.find(d=>d>lastSt) || null
    : allDelivDates[0];
  if(!periodStart) return null;

  const periodEnd = TODAY;
  const delivsInPeriod = S.deliveries.filter(d=>d.ptId===ptId && d.date>=periodStart && d.date<=periodEnd);
  const leftsInPeriod  = S.leftovers.filter(l=>l.ptId===ptId && l.date>=periodStart && l.date<=periodEnd);

  const delivered={}, leftover={};
  TK.forEach(k=>{delivered[k]=0;leftover[k]=0});
  delivsInPeriod.forEach(d=>TK.forEach(k=>{delivered[k]+=(parseInt(d.items[k])||0)}));
  leftsInPeriod.forEach(l=>TK.forEach(k=>{leftover[k]+=(parseInt(l.items[k])||0)}));

  const totalDelivered = cval(delivered, ptId);
  const totalLeftover  = cval(leftover, ptId);
  const totalNet       = totalDelivered - totalLeftover;

  const totalDelivCount = TK.reduce((s,k)=>s+delivered[k],0);
  const totalLeftCount  = TK.reduce((s,k)=>s+leftover[k],0);
  const totalNetCount   = totalDelivCount - totalLeftCount;

  return {
    ptId, periodStart, periodEnd,
    delivered, leftover,
    totalDelivered, totalLeftover, totalNet,
    totalDelivCount, totalLeftCount, totalNetCount,
    existingDebt: ptDebt(ptId) - totalNet
  };
}

// Nouvelle méthode d'upload beaucoup plus sûre (Simple Upload)
async function uploadD(content){
  if(!GD.fileId) throw new Error('No File ID');
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files/'+GD.fileId+'?uploadType=media', {
    method: 'PATCH',
    headers: {
      'Authorization': 'Bearer ' + GD.token,
      'Content-Type': 'application/json'
    },
    body: content
  });
  if(!res.ok) throw new Error('Upload échoué : ' + res.status);
  return await res.json();
}

async function createD(content){
  // Etape 1: Créer le fichier vide avec les métadonnées
  const resMeta = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + GD.token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ name: 'makhbaza_backup.json', parents: ['appDataFolder'] })
  });
  if(!resMeta.ok) throw new Error('Création métadonnées échouée');
  const meta = await resMeta.json();
  GD.fileId = meta.id;
  // Etape 2: Envoyer le contenu
  await uploadD(content);
}

async function syncDrive(){
  if(!GD.token){googleSignIn();return;}
  setSync('syncing');renderSettings();
  try{
    const sr=await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27makhbaza_backup.json%27&fields=files(id)',
      {headers:{Authorization:'Bearer '+GD.token}});
    if(!sr.ok) throw new Error('Recherche échouée');
    const sd=await sr.json();
    
    if(sd.files?.length>0){
      GD.fileId=sd.files[0].id;
      const dr=await fetch('https://www.googleapis.com/drive/v3/files/'+GD.fileId+'?alt=media',
        {headers:{Authorization:'Bearer '+GD.token}});
      if(!dr.ok) throw new Error('Lecture échouée');
      const cloudText=await dr.text();
      
      let cloudData={};
      try{ cloudData = JSON.parse(cloudText); }catch(e){}
      
      const cloudTs = cloudData._ts || 0;
      const localTs = S._ts || 0;
      
      if(cloudTs > localTs){
        mergeFromSync(cloudText);
        setSync('ok');renderSettings();toast('📥 تم جلب البيانات من السحابة');
      } else if(localTs > cloudTs){
        await uploadD(dataForSync());
        setSync('ok');renderSettings();toast('📤 تم رفع التحديثات');
      } else {
        setSync('ok');renderSettings();toast('✅ البيانات متزامنة');
      }
    }else{
      // Fichier inexistant, on le crée
      save(); // Force l'actualisation du timestamp
      await createD(dataForSync());
      setSync('ok');renderSettings();toast('✓ تم إنشاء ملف السحابة');
    }
  }catch(e){
    console.error(e);
    setSync('err');renderSettings();toast('خطأ في الاتصال بالانترنت أو السحابة','e');
  }
}

function regSW(){
  if(!('serviceWorker' in navigator))return;
  const c=`const C='mkh-v4';const A=[self.location.pathname];self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.status===200){const c2=res.clone();caches.open(C).then(ca=>ca.put(e.request,c2))}return res})))});`;
  try{const bl=new Blob([c],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(bl));}catch(e){}
}

function renderDeliv(){
  let h=`<div class="pills">
    <div class="pill ${!DF.leftMode?'on':''}" onclick="setMode(false)">🚚 تسليم خبز</div>
    <div class="pill ${DF.leftMode?'on':''}" onclick="setMode(true)">📦 تسجيل فائض</div>
  </div>`;
  if(!S.points.length){h+=`<div class="alrt alrt-w">أضف نقطة بيع أولاً</div>`;}
  else if(!DF.leftMode){h+=bDelivForm();}
  else{h+=bLeftForm();}
  document.getElementById('scr-deliv').innerHTML=h;
}
function bTGrid(items,ptId,pfx){
  const pr=ptId?gpr(ptId):DP;
  let h=`<div class="tgrid">`;
  TK.forEach(k=>{
    const v=items[k]||'';
    h+=`<div class="tcard">
      <div style="display:flex;justify-content:center">${BSVG[k]}</div>
      <div class="tcard-nm">${TM[k].label}</div>
      <div class="tcard-pr">${pr[k].toFixed(2)} د.م${TM[k].note?`<br><small style="color:var(--A)">${TM[k].note}</small>`:''}</div>
      <input type="number" min="0" step="1" placeholder="0" value="${v}"
        oninput="${pfx}['${k}']=this.value${pfx==='DF.items'?';updSum()':''}">
    </div>`;
  });
  h+=`</div>`;return h;
}
function bDelivForm(){
  const ptId=DF.ptId;const items=DF.items;
  const total=ptId?cval(items,ptId):0;const hasQ=hasI(items)&&ptId;
  let h=`<div class="fg"><label class="fl">نقطة البيع</label>
    <select id="f-pt" onchange="DF.ptId=this.value;renderDeliv()">
      <option value="">— اختر نقطة —</option>
      ${S.points.map(p=>`<option value="${p.id}" ${ptId===p.id?'selected':''}>${p.name}</option>`).join('')}
    </select></div>`;
  h+=`<div class="slbl">الكميات حسب النوع</div>`;
  h+=bTGrid(items,ptId,'DF.items');
  if(hasQ){
    h+=`<div class="sum-box" id="dsum">`;
    const pr=gpr(ptId);
    TK.forEach(k=>{const q=parseInt(items[k])||0;if(!q)return;
      h+=`<div class="sum-row"><span>${q} × ${TM[k].label}</span><span>${(q*pr[k]).toFixed(2)} د.م</span></div>`;
    });
    h+=`<div class="sum-row sum-total"><span>المجموع</span><span>${total.toFixed(2)} د.م</span></div></div>`;
  }
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="fg"><label class="fl">الساعة</label><input type="time" id="f-time" value="${DF.time}" oninput="DF.time=this.value"></div>
    <div class="fg"><label class="fl">المسؤول</label>
      <input type="text" id="f-drv" list="drvs" value="${DF.driver}" placeholder="الاسم" oninput="DF.driver=this.value">
      <datalist id="drvs">${S.drivers.map(d=>`<option value="${d}">`).join('')}</datalist>
    </div></div>`;
  h+=`<div class="fg"><label class="fl">ملاحظات</label><input type="text" id="f-notes" value="${DF.notes}" placeholder="اختياري" oninput="DF.notes=this.value"></div>`;
  h+=`<button class="btn btn-p" onclick="submitDeliv()">✓ تسجيل التسليم</button>`;
  return h;
}
function updSum(){
  TK.forEach((k,i)=>{const inp=document.querySelectorAll('#scr-deliv .tcard input[type=number]')[i];if(inp)DF.items[k]=inp.value;});
  const ptId=document.getElementById('f-pt')?.value||DF.ptId;if(!ptId)return;DF.ptId=ptId;
  const pr=gpr(ptId);const items=DF.items;const total=cval(items,ptId);const hasQ=hasI(items);
  let box=document.getElementById('dsum');
  if(hasQ){
    let inner='';
    TK.forEach(k=>{const q=parseInt(items[k])||0;if(!q)return;
      inner+=`<div class="sum-row"><span>${q} × ${TM[k].label}</span><span>${(q*pr[k]).toFixed(2)} د.م</span></div>`;
    });
    inner+=`<div class="sum-row sum-total"><span>المجموع</span><span>${total.toFixed(2)} د.م</span></div>`;
    if(!box){const d2=document.createElement('div');d2.className='sum-box';d2.id='dsum';d2.innerHTML=inner;document.querySelector('#scr-deliv .tgrid')?.after(d2);}
    else box.innerHTML=inner;
  }else if(box)box.remove();
}
function bLeftForm(){
  const items=DF.lItems;const ptId=DF.lPtId;
  const total=ptId?cval(items,ptId):0;const hasQ=hasI(items)&&ptId;
  let h=`<p style="font-size:13px;color:var(--tx2);margin-bottom:14px">سجل الخبز المتبقي في نهاية اليوم.</p>`;
  h+=`<div class="fg"><label class="fl">نقطة البيع</label>
    <select onchange="DF.lPtId=this.value;renderDeliv()">
      <option value="">— اختر نقطة —</option>
      ${S.points.map(p=>`<option value="${p.id}" ${ptId===p.id?'selected':''}>${p.name}</option>`).join('')}
    </select></div>`;
  h+=bTGrid(items,ptId,'DF.lItems');
  if(hasQ&&ptId){
    const pr=gpr(ptId);
    h+=`<div class="sum-box">`;
    TK.forEach(k=>{const q=parseInt(items[k])||0;if(!q)return;
      h+=`<div class="sum-row"><span>${q} × ${TM[k].label}</span><span>${(q*pr[k]).toFixed(2)} د.م</span></div>`;
    });
    h+=`<div class="sum-row sum-total"><span>إجمالي الفائض</span><span>${total.toFixed(2)} د.م</span></div></div>`;
  }
  h+=`<button class="btn btn-p" onclick="submitLeft()">✓ تسجيل الفائض</button>`;
  const tl=S.leftovers.filter(l=>l.date===TODAY);
  if(tl.length){
    h+=`<div class="slbl">الفائض المسجل اليوم</div><div class="card">`;
    tl.forEach(l=>{
      const pt=S.points.find(p=>p.id===l.ptId);
      h+=`<div class="ditem"><div class="ddot" style="background:var(--AM)"></div>
        <div class="dinfo"><div class="dval">${pt?pt.name:'?'}</div><div class="dmeta">${fmtI(l.items)}</div></div>
        <div style="display:flex;align-items:center;gap:7px">
          <span class="bdg bdg-a">${cval(l.items,l.ptId).toFixed(2)} د.م</span>
          <button class="icon-btn" onclick="delLeft('${l.ptId}','${l.date}')">✕</button>
        </div></div>`;
    });
    h+=`</div>`;
  }
  return h;
}
function setMode(b){DF.leftMode=b;renderDeliv();}
function submitDeliv(){
  const ptId=document.getElementById('f-pt')?.value||DF.ptId;
  const time=document.getElementById('f-time')?.value||DF.time;
  const driver=(document.getElementById('f-drv')?.value||DF.driver).trim();
  const notes=(document.getElementById('f-notes')?.value||DF.notes).trim();
  const items=ei();
  TK.forEach((k,i)=>{const inp=document.querySelectorAll('#scr-deliv .tcard input[type=number]')[i];if(inp)items[k]=inp.value||'0';});
  if(!ptId){toast('اختر نقطة بيع','e');return;}
  if(!hasI(items)){toast('أدخل كمية خبز','e');return;}
  S.deliveries.push({id:Date.now()+'',ptId,date:TODAY,time:time||nstr(),items,driver,notes});
  if(driver&&!S.drivers.includes(driver))S.drivers.push(driver);
  DF={...DF,items:ei(),notes:''};
  save();autoSync();toast(`✓ تم تسجيل ${cval(items,ptId).toFixed(2)} د.م`);render();
}
function submitLeft(){
  const ptId=document.querySelector('#scr-deliv select')?.value||DF.lPtId;
  const items=ei();
  TK.forEach((k,i)=>{const inp=document.querySelectorAll('#scr-deliv .tcard input[type=number]')[i];if(inp)items[k]=inp.value||'0';});
  if(!ptId){toast('اختر نقطة بيع','e');return;}
  S.leftovers=S.leftovers.filter(l=>!(l.ptId===ptId&&l.date===TODAY));
  S.leftovers.push({ptId,date:TODAY,items});
  DF={...DF,lItems:ei()};
  save();autoSync();toast('✓ تم تسجيل الفائض');render();
}
function delLeft(ptId,date){S.leftovers=S.leftovers.filter(l=>!(l.ptId===ptId&&l.date===date));save();autoSync();render();}

//  POINTS
// ═══════════════════════════════════════════════
function renderPts(){
  let h=`<div class="slbl">إضافة نقطة جديدة</div>
    <div class="card-flat">
      <div class="fg"><label class="fl">اسم نقطة البيع</label>
        <input type="text" id="np-n" placeholder="مثال: دكان سيدي عثمان"></div>
      <div class="fg" style="margin-bottom:8px"><label class="fl">الموقع / العنوان</label>
        <input type="text" id="np-a" placeholder="اختياري"></div>
      <button class="btn btn-p" onclick="addPt()">+ إضافة النقطة</button>
    </div>
    <div class="slbl">نقاط البيع (${S.points.length})</div>`;
  if(!S.points.length){h+=`<div class="empty"><div class="empty-icon">📍</div>لم تضف أي نقطة بعد</div>`;}
  else{
    h+=`<div class="card">`;
    S.points.forEach(pt=>{
      const ds=gd(pt.id,TODAY);const net=ptNet(pt.id,TODAY);const debt=ptDebt(pt.id);
      h+=`<div class="pitem" onclick="viewPt('${pt.id}')">
        <div class="pav">${pt.name.trim()[0]||'?'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600">${pt.name}</div>
          <div style="font-size:12px;color:var(--tx2);margin-top:2px">${ds.length} مرور اليوم${debt>0?` · <span style="color:#D85A30">دين ${debt.toFixed(2)} د.م</span>`:' · ✓'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="text-align:left"><div style="font-size:15px;font-weight:700;color:var(--A)">${net.toFixed(2)}</div><div style="font-size:10px;color:var(--tx2)">اليوم</div></div>
          <button class="icon-btn" onclick="event.stopPropagation();delPt('${pt.id}')">✕</button>
        </div></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('scr-pts').innerHTML=h;
}
function addPt(){
  const n=document.getElementById('np-n')?.value.trim();const a=document.getElementById('np-a')?.value.trim();
  if(!n){toast('أدخل اسم النقطة','e');return;}
  S.points.push({id:Date.now()+'',name:n,address:a||'',prices:{...DP}});
  save();autoSync();toast('✓ تمت إضافة النقطة');render();
}
function delPt(id){
  if(!confirm('تأكيد حذف هذه النقطة وجميع بياناتها؟'))return;
  S.points=S.points.filter(p=>p.id!==id);
  S.deliveries=S.deliveries.filter(d=>d.ptId!==id);
  S.leftovers=S.leftovers.filter(l=>l.ptId!==id);
  S.settlements=S.settlements.filter(s=>s.ptId!==id);
  save();autoSync();render();
}
function viewPt(id){
  SEL_PT=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('scr-pts').classList.add('on');
  document.getElementById('n-pts').classList.add('on');
  CUR='pts';scrollTop();renderPtDetail();
}

function renderPtDetail(){
  const pt=S.points.find(p=>p.id===SEL_PT);if(!pt){SEL_PT=null;renderPts();return;}
  const pr=gpr(pt.id);
  const ds=gd(pt.id,TODAY);
  const totV=ds.reduce((s,d)=>s+cval(d.items,pt.id),0);
  const lft=gl(pt.id,TODAY);const lftV=lft?cval(lft.items,pt.id):0;
  const net=totV-lftV;
  const bt=btTime(pt.id);const sbd=sByDay(pt.id);const mx=Math.max(...sbd.map(s=>s[1]),1);
  const debt=ptDebt(pt.id);
  const stl=calcSettlement(pt.id);
  const ptSettlements=S.settlements.filter(s=>s.ptId===pt.id).sort((a,b)=>a.date>b.date?-1:1);

  let h=`<button class="back-btn" onclick="SEL_PT=null;renderPts()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    العودة للنقاط
  </button>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
    <div><div style="font-size:19px;font-weight:700">${pt.name}</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:3px">${pt.address||'بدون عنوان'}</div></div>
    <button class="btn btn-s btn-sm" onclick="openPriceModal('${pt.id}')">⚙️ الأسعار</button>
  </div>
  <div class="mgrid">
    <div class="met"><div class="met-lbl">موزع اليوم</div><div class="met-val">${totV.toFixed(2)}</div><div class="met-sub">درهم</div></div>
    <div class="met"><div class="met-lbl">صافي اليوم</div><div class="met-val">${net.toFixed(2)}</div><div class="met-sub">درهم</div></div>
  </div>`;

  h+=`<div class="debt-banner ${debt>0?'has-debt':'no-debt'}">
    <div>
      <div style="font-size:13px;font-weight:700;color:${debt>0?'#993C1D':'var(--TD)'}">
        ${debt>0?'💰 الرصيد المتبقي (دين)':'✅ لا يوجد رصيد مستحق'}
      </div>
      ${debt>0?`<div style="font-size:11px;margin-top:3px;color:#D85A30">مستحق التحصيل</div>`:''}
    </div>
    <div style="font-size:24px;font-weight:700;color:${debt>0?'#D85A30':'var(--T)'}">
      ${debt.toFixed(2)} <span style="font-size:13px;font-weight:400">د.م</span>
    </div>
  </div>`;

  if(stl && stl.totalNet>0){
    h+=`<button class="btn btn-teal" style="margin-bottom:14px" onclick="openSettleModal('${pt.id}')">
      💵 التخليص — ${stl.totalNet.toFixed(2)} د.م مستحق
    </button>`;
  }else{
    h+=`<div class="alrt alrt-s" style="margin-bottom:14px">✅ لا توجد مبيعات غير مخلّصة في هذه الفترة</div>`;
  }

  h+=`<div class="slbl">أسعار هذه النقطة</div>
    <div class="card-flat" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
  TK.forEach(k=>{
    h+=`<div style="display:flex;align-items:center;gap:7px">
      ${BSVG_SM(k)}
      <div><div style="font-size:12px;font-weight:600">${TM[k].short}</div>
           <div style="font-size:14px;font-weight:700;color:var(--A)">${pr[k].toFixed(2)} د.م</div></div>
    </div>`;
  });
  h+=`</div>`;

  const typeBreak=ei();
  ds.forEach(d=>TK.forEach(k=>{typeBreak[k]=String((parseInt(typeBreak[k])||0)+(parseInt(d.items[k])||0));}));
  if(TK.some(k=>parseInt(typeBreak[k])>0)){
    h+=`<div class="slbl">تفصيل أنواع الخبز اليوم</div><div class="card">`;
    TK.forEach(k=>{const q=parseInt(typeBreak[k])||0;if(!q)return;
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--br)">
        ${BSVG_XS(k)}
        <span style="flex:1;font-size:13px;font-weight:500">${TM[k].label}</span>
        <span style="font-size:13px">${q} × ${pr[k].toFixed(2)} = <strong style="color:var(--A)">${(q*pr[k]).toFixed(2)} د.م</strong></span>
      </div>`;
    });
    h+=`</div>`;
  }

  if(bt){h+=`<div class="best-time"><div><div style="font-size:13px;font-weight:600;color:var(--AD)">⏰ أنسب وقت للتوزيع</div><div style="font-size:11px;color:var(--A)">بناءً على سجل المبيعات</div></div><div style="font-size:20px;font-weight:700;color:var(--AX)">${bt}</div></div>`;}

  if(sbd.length){
    h+=`<div class="slbl">المبيعات آخر ${sbd.length} أيام</div><div class="card">`;
    sbd.forEach(([date,val])=>{
      h+=`<div class="bbar"><div class="bbar-head"><span>${dl(date)}</span><span>${val.toFixed(2)} د.م</span></div>
        <div class="btrack"><div class="bfill" style="width:${Math.round(val/mx*100)}%"></div></div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="slbl">تسليمات اليوم (${ds.length})</div>`;
  if(!ds.length){h+=`<div class="empty">لا تسليمات اليوم لهذه النقطة</div>`;}
  else{
    h+=`<div class="card">`;
    [...ds].sort((a,b)=>a.time>b.time?1:-1).forEach(d=>{
      h+=`<div class="ditem"><div class="ddot"></div>
        <div class="dinfo"><div class="dval">${cval(d.items,pt.id).toFixed(2)} د.م</div>
          <div class="dmeta">${fmtI(d.items)}${d.driver?` · <span class="dtag">👤 ${d.driver}</span>`:''}</div></div>
        <div style="display:flex;align-items:center;gap:7px">
          <div class="dtime">${d.time}</div>
          <button class="icon-btn" onclick="delDelivery('${d.id}')">✕</button>
        </div></div>`;
    });
    h+=`</div>`;
  }

  if(ptSettlements.length){
    h+=`<div class="slbl">سجل التخليص (${ptSettlements.length} عملية)</div><div class="card">`;
    ptSettlements.forEach(st=>{
      const isPartial=st.paid<st.totalNet;
      h+=`<div class="settle-hist-item">
        <div class="settle-hist-head">
          <div class="settle-hist-date">${dl(st.date)}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="bdg ${isPartial?'bdg-r':'bdg-t'}">${isPartial?'جزئي':'كامل'}</span>
            <span style="font-size:15px;font-weight:700;color:var(--A)">${st.paid.toFixed(2)} د.م</span>
          </div>
        </div>
        <div class="settle-hist-period">من ${dl(st.dateFrom)} إلى ${dl(st.dateTo)}</div>
        <div class="settle-hist-detail">
          <span class="bdg bdg-a">مزوّد: ${st.totalDelivCount}</span>
          <span class="bdg bdg-p">مرتجع: ${st.totalLeftCount}</span>
          <span class="bdg bdg-g">مباع: ${st.totalNetCount}</span>
          ${isPartial?`<span class="bdg bdg-r">باقي: ${(st.totalNet-st.paid).toFixed(2)} د.م</span>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  document.getElementById('scr-pts').innerHTML=h;
}
function delDelivery(id){S.deliveries=S.deliveries.filter(d=>d.id!==id);save();autoSync();renderPtDetail();}

function openSettleModal(ptId){
  const pt=S.points.find(p=>p.id===ptId);if(!pt)return;
  const stl=calcSettlement(ptId);if(!stl)return;

  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='pm';ov.onclick=closeModal;
  const pr=gpr(ptId);

  let typeRows='';
  TK.forEach(k=>{
    const dq=stl.delivered[k]||0;const lq=stl.leftover[k]||0;const nq=dq-lq;
    if(!dq&&!lq)return;
    typeRows+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--br)">
      ${BSVG_XS(k)}
      <span style="flex:1;font-size:12px;font-weight:500">${TM[k].label}</span>
      <span style="font-size:12px;color:var(--tx2)">${dq}↓ ${lq}↩</span>
      <span style="font-size:13px;font-weight:600;color:var(--A)">${nq} × ${pr[k].toFixed(2)} = ${(nq*pr[k]).toFixed(2)} د.م</span>
    </div>`;
  });

  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">💵 تخليص — ${pt.name}</div>

    <div class="settle-period">
      <div style="font-size:11px;color:var(--tx2);margin-bottom:4px">الفترة المشمولة</div>
      <strong>من ${dl(stl.periodStart)} إلى ${dl(stl.periodEnd)}</strong>
    </div>

    <div class="settle-grid">
      <div class="settle-box">
        <div class="settle-box-val">${stl.totalDelivCount}</div>
        <div class="settle-box-lbl">مزوّد</div>
      </div>
      <div class="settle-box red">
        <div class="settle-box-val">${stl.totalLeftCount}</div>
        <div class="settle-box-lbl">مرتجع</div>
      </div>
      <div class="settle-box green">
        <div class="settle-box-val">${stl.totalNetCount}</div>
        <div class="settle-box-lbl">مباع</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;padding:10px">${typeRows}</div>

    <div class="settle-hero">
      <div class="settle-hero-amount">${stl.totalNet.toFixed(2)}</div>
      <div class="settle-hero-lbl">درهم إجمالي مستحق</div>
    </div>

    <div class="slbl">نوع التخليص</div>
    <div class="pills" id="settle-type-pills">
      <div class="pill on" onclick="setSettleType('full',${stl.totalNet})" id="stp-full">💯 تخليص كامل</div>
      <div class="pill" onclick="setSettleType('partial',${stl.totalNet})" id="stp-partial">🔢 جزئي</div>
    </div>

    <div id="partial-input" style="display:none" class="fg">
      <label class="fl">المبلغ المدفوع فعلياً (درهم)</label>
      <input type="number" id="settle-paid-input" min="0" step="0.5" placeholder="0.00"
        value="${stl.totalNet.toFixed(2)}" oninput="updSettleBalance(${stl.totalNet})">
      <div id="settle-balance-row" style="margin-top:8px;padding:8px 12px;background:var(--CL);border-radius:var(--r);font-size:13px;color:#993C1D;display:none">
        الرصيد المتبقي: <strong id="settle-balance-val">0.00</strong> درهم
      </div>
    </div>

    <input type="hidden" id="settle-type-val" value="full">
    <input type="hidden" id="settle-amount-val" value="${stl.totalNet.toFixed(2)}">

    <button class="btn btn-teal" style="margin-top:6px" onclick="confirmSettle('${ptId}')">
      ✓ تأكيد التخليص
    </button>
    <button class="btn btn-s" style="margin-top:8px" onclick="closeModal()">إلغاء</button>
  </div>`;
  document.body.appendChild(ov);
}

function setSettleType(type,total){
  document.getElementById('stp-full')?.classList.toggle('on',type==='full');
  document.getElementById('stp-partial')?.classList.toggle('on',type==='partial');
  document.getElementById('partial-input').style.display=type==='partial'?'block':'none';
  document.getElementById('settle-type-val').value=type;
  if(type==='full'){
    document.getElementById('settle-amount-val').value=total.toFixed(2);
    document.getElementById('settle-balance-row').style.display='none';
  }else{
    const v=parseFloat(document.getElementById('settle-paid-input')?.value)||0;
    document.getElementById('settle-amount-val').value=v.toFixed(2);
  }
}
function updSettleBalance(total){
  const paid=parseFloat(document.getElementById('settle-paid-input')?.value)||0;
  document.getElementById('settle-amount-val').value=paid.toFixed(2);
  const rem=total-paid;
  const row=document.getElementById('settle-balance-row');
  const val=document.getElementById('settle-balance-val');
  if(rem>0.01){row.style.display='block';val.textContent=rem.toFixed(2);}
  else{row.style.display='none';}
}
function confirmSettle(ptId){
  const stl=calcSettlement(ptId);if(!stl){closeModal();return;}
  const type=document.getElementById('settle-type-val')?.value||'full';
  const paid=parseFloat(document.getElementById('settle-amount-val')?.value)||stl.totalNet;

  S.settlements.push({
    id:Date.now()+'',ptId,
    date:TODAY,
    dateFrom:stl.periodStart,
    dateTo:stl.periodEnd,
    type,
    paid:Math.min(paid,stl.totalNet),
    totalNet:stl.totalNet,
    totalDelivCount:stl.totalDelivCount,
    totalLeftCount:stl.totalLeftCount,
    totalNetCount:stl.totalNetCount,
    delivered:stl.delivered,
    leftover:stl.leftover
  });

  save();autoSync();closeModal();
  toast(`✓ تم تسجيل التخليص: ${Math.min(paid,stl.totalNet).toFixed(2)} د.م`);
  renderPtDetail();
}

// ═══════════════════════════════════════════════
//  PRICE MODAL
// ═══════════════════════════════════════════════
function openPriceModal(ptId){
  const pt=S.points.find(p=>p.id===ptId);if(!pt)return;const pr=gpr(ptId);
  const ov=document.createElement('div');ov.className='modal-overlay';ov.id='pm';ov.onclick=closeModal;
  ov.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ أسعار — ${pt.name}</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:14px">خصص ثمن التوزيع لكل نوع خبز لهذه النقطة.</p>
    ${TK.map(k=>`
      <div class="fg" style="display:flex;align-items:center;gap:10px">
        <div>${BSVG_SM(k)}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${TM[k].label}</div>
          ${TM[k].note?`<div style="font-size:11px;color:var(--tx2)">${TM[k].note}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="pr-${k}" min="0" step="0.25" value="${pr[k]}" style="width:85px">
          <span style="font-size:13px;color:var(--tx2)">د.م</span>
        </div>
      </div>`).join('')}
    <button class="btn btn-p" style="margin-top:6px" onclick="savePrices('${ptId}')">✓ حفظ الأسعار</button>
    <button class="btn btn-s" style="margin-top:8px" onclick="resetPrices('${ptId}')">↩ الأسعار الافتراضية</button>
    <button class="btn btn-d" style="margin-top:8px" onclick="closeModal()">إلغاء</button>
  </div>`;
  document.body.appendChild(ov);
}
function savePrices(ptId){
  const pt=S.points.find(p=>p.id===ptId);if(!pt)return;
  const prices={};TK.forEach(k=>{const v=parseFloat(document.getElementById('pr-'+k)?.value);prices[k]=isNaN(v)?DP[k]:Math.max(0,v);});
  pt.prices=prices;save();autoSync();closeModal();toast('✓ تم حفظ الأسعار');render();
}
function resetPrices(ptId){
  const pt=S.points.find(p=>p.id===ptId);if(!pt)return;
  pt.prices={...DP};save();closeModal();toast('↩ تم إعادة الأسعار الافتراضية');render();
}
function closeModal(){document.getElementById('pm')?.remove();}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════
function renderStats(){
  if(!S.points.length){document.getElementById('scr-stats').innerHTML=`<div class="empty"><div class="empty-icon">📊</div>أضف نقاط بيع وسجل توزيعات</div>`;return;}
  const allDates=[...new Set(S.deliveries.map(d=>d.date))].sort().reverse().slice(0,10);
  const byPt=S.points.map(pt=>{
    const tot=S.deliveries.filter(d=>d.ptId===pt.id).reduce((s,d)=>s+cval(d.items,pt.id),0);
    const lft=S.leftovers.filter(l=>l.ptId===pt.id).reduce((s,l)=>s+cval(l.items,pt.id),0);
    const debt=ptDebt(pt.id);
    return{pt,net:tot-lft,tot,debt};
  }).sort((a,b)=>b.net-a.net);
  const mx=Math.max(...byPt.map(x=>x.net),1);
  const typeTot={};const lftTot={};
  TK.forEach(k=>{typeTot[k]=0;lftTot[k]=0;});
  S.deliveries.forEach(d=>TK.forEach(k=>{typeTot[k]+=(parseInt(d.items[k])||0);}));
  S.leftovers.forEach(l=>TK.forEach(k=>{lftTot[k]+=(parseInt(l.items[k])||0);}));

  const totalDebt=S.points.reduce((s,pt)=>s+ptDebt(pt.id),0);
  const totalSettled=S.settlements.reduce((s,st)=>s+st.paid,0);

  let h=`<div class="mgrid">
    <div class="met"><div class="met-lbl">إجمالي الديون</div><div class="met-val" style="color:${totalDebt>0?'#D85A30':'var(--T)'}">${totalDebt.toFixed(2)}</div><div class="met-sub">درهم مستحق</div></div>
    <div class="met"><div class="met-lbl">إجمالي التخليص</div><div class="met-val" style="color:var(--T)">${totalSettled.toFixed(2)}</div><div class="met-sub">درهم تم تحصيله</div></div>
  </div>`;

  h+=`<div class="slbl">وضعية التخليص لكل نقطة</div><div class="card">`;
  byPt.forEach(({pt,net,debt})=>{
    h+=`<div class="balance-row" onclick="viewPt('${pt.id}')" style="cursor:pointer">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--A)">${pt.name}</div>
        <div style="font-size:12px;color:var(--tx2)">إجمالي مباع: ${net.toFixed(2)} د.م</div>
      </div>
      <div style="text-align:left">
        <div style="font-size:15px;font-weight:700;color:${debt>0?'#D85A30':'var(--T)'}">${debt.toFixed(2)} د.م</div>
        <div style="font-size:11px;color:var(--tx2)">${debt>0?'مستحق':'✓ مصفى'}</div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  h+=`<div class="slbl">إجمالي حسب نوع الخبز</div><div class="card">`;
  TK.forEach(k=>{
    const net=typeTot[k]-lftTot[k];
    h+=`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--br)">
      ${BSVG_XS(k)}
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${TM[k].label}</div>
        <div style="font-size:11px;color:var(--tx2)">موزع ${typeTot[k]} · فائض ${lftTot[k]}</div></div>
      <div style="text-align:left"><div style="font-size:16px;font-weight:700;color:var(--A)">${net}</div><div style="font-size:10px;color:var(--tx2)">صافي</div></div>
    </div>`;
  });
  h+=`</div>`;

  h+=`<div class="slbl">ترتيب نقاط البيع</div><div class="card">`;
  byPt.forEach(({pt,net,tot})=>{
    const bt=btTime(pt.id);
    h+=`<div style="margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
        <span style="font-weight:600;cursor:pointer;color:var(--A)" onclick="viewPt('${pt.id}')">${pt.name}</span>
        <span>${net.toFixed(2)} <span style="color:var(--tx2)">/ ${tot.toFixed(2)} د.م</span></span>
      </div>
      <div class="btrack"><div class="bfill" style="width:${Math.round(net/mx*100)}%"></div></div>
      ${bt?`<div style="font-size:11px;color:var(--A);margin-top:3px">⏰ أنسب وقت: ${bt}</div>`:''}
    </div>`;
  });
  h+=`</div>`;

  const drvStats={};
  S.deliveries.forEach(d=>{if(d.driver)drvStats[d.driver]=(drvStats[d.driver]||0)+cval(d.items,d.ptId);});
  const drvArr=Object.entries(drvStats).sort((a,b)=>b[1]-a[1]);
  if(drvArr.length){
    h+=`<div class="slbl">أداء المسؤولين</div><div class="card">`;
    const mxD=Math.max(...drvArr.map(x=>x[1]),1);
    drvArr.forEach(([name,val])=>{
      const trips=S.deliveries.filter(d=>d.driver===name).length;
      h+=`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
          <span style="font-weight:600">👤 ${name}</span>
          <span>${val.toFixed(2)} د.م · ${trips} رحلة</span>
        </div>
        <div class="btrack"><div class="bfill bfill-t" style="width:${Math.round(val/mxD*100)}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(allDates.length){
    h+=`<div class="slbl">تطور المبيعات اليومية</div><div class="card">`;
    allDates.forEach(date=>{
      const tot=S.deliveries.filter(d=>d.date===date).reduce((s,d)=>s+cval(d.items,d.ptId),0);
      const lft=S.leftovers.filter(l=>l.date===date).reduce((s,l)=>s+cval(l.items,l.ptId),0);
      h+=`<div class="hrow"><span>${dl(date)}</span><span style="font-weight:600;color:var(--A)">${(tot-lft).toFixed(2)} <span style="font-size:11px;font-weight:400;color:var(--tx2)">د.م صافي</span></span></div>`;
    });
    h+=`</div>`;
  }
  document.getElementById('scr-stats').innerHTML=h;
}

// ═══════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════
function renderSettings(){
  const connected=!!GD.token;const t=CFG.theme||'auto';
  let h=`<div class="slbl">🎨 مظهر التطبيق</div>
    <div class="card-flat">
      <div class="theme-pills">
        <div class="theme-pill ${t==='light'?'on':''}" onclick="setTheme('light')">☀️<br>فاتح</div>
        <div class="theme-pill ${t==='auto'?'on':''}" onclick="setTheme('auto')">⚙️<br>تلقائي</div>
        <div class="theme-pill ${t==='dark'?'on':''}" onclick="setTheme('dark')">🌙<br>داكن</div>
      </div>
    </div>`;

  h+=`<div class="slbl">☁️ المزامنة مع Google Drive</div>
    ${syncStatusHtml()}
    <div class="card">
      <div class="fg"><label class="fl">Google Client ID</label>
        <input type="text" id="gcid" value="${CFG.googleClientId}" placeholder="xxxx.apps.googleusercontent.com"
          oninput="CFG.googleClientId=this.value;save();initGoogleAuth();">
        <div style="font-size:11px;color:var(--tx2);margin-top:5px">من Google Cloud Console ← APIs ← Credentials</div>
      </div>
      <div class="srow">
        <div><div class="srow-lbl">مزامنة تلقائية عند كل تغيير</div>
          <div class="srow-sub">يحتاج الاتصال بالانترنت</div></div>
        <button class="switch ${CFG.autoSync?'on':''}" onclick="CFG.autoSync=!CFG.autoSync;save();renderSettings()"></button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
        <button class="btn ${connected?'btn-s':'btn-g'}" onclick="googleSignIn()">
          ${connected?'🔄 مزامنة الآن':'🔗 ربط Google'}
        </button>
        ${connected?`<button class="btn btn-d" onclick="GD.token=null;GD.fileId=null;setSync('idle');renderSettings();toast('تم قطع ربط Google')">قطع الربط</button>`:'<div></div>'}
      </div>
    </div>`;

  // LES NOUVEAUX BOUTONS DE FORÇAGE POUR SÉCURISER L'UTILISATEUR
  if(connected) {
      h+=`<div class="slbl">⚡ التحكم اليدوي بالسحابة (في حالة المشاكل)</div><div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button class="btn btn-s" onclick="forceDownload()" style="font-size:13px;padding:10px">📥 تنزيل إجباري</button>
          <button class="btn btn-s" onclick="forceUpload()" style="font-size:13px;padding:10px">📤 رفع إجباري</button>
        </div>
        <div style="font-size:11px;color:var(--tx2);margin-top:8px;text-align:center">استخدمها فقط إذا لم تنتقل بياناتك لجهاز آخر</div>
      </div>`;
  }

  h+=`<div class="slbl">💾 النسخ الاحتياطي المحلي</div><div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-s" onclick="exportData()">📤 تصدير JSON</button>
      <button class="btn btn-s" onclick="document.getElementById('imp-f').click()">📥 استيراد</button>
    </div>
    <input type="file" id="imp-f" accept=".json" style="display:none" onchange="importData(this)">
  </div>`;

  h+=`<div class="slbl">📊 البيانات المحفوظة</div><div class="card">
    <div class="srow"><div class="srow-lbl">نقاط البيع</div><span class="bdg bdg-a">${S.points.length}</span></div>
    <div class="srow"><div class="srow-lbl">إجمالي التسليمات</div><span class="bdg bdg-t">${S.deliveries.length}</span></div>
    <div class="srow"><div class="srow-lbl">سجلات الفائض</div><span class="bdg bdg-g">${S.leftovers.length}</span></div>
    <div class="srow"><div class="srow-lbl">عمليات التخليص</div><span class="bdg bdg-p">${S.settlements.length}</span></div>
    <button class="btn btn-d" style="margin-top:14px" onclick="clearData()">🗑️ حذف جميع البيانات</button>
  </div>

  <div style="text-align:center;padding:20px 0 10px;font-size:11px;color:var(--tx3)">مخبزتي v5.0 · مزامنة السحابة المتقدمة</div>`;

  document.getElementById('scr-settings').innerHTML=h;
}
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(dataForSync());
  a.download='makhbaza_backup_'+TODAY+'.json';a.click();toast('✓ تم تصدير البيانات');
}
function importData(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{try{mergeFromSync(e.target.result);}catch(err){toast('خطأ في قراءة الملف','e');}};
  r.readAsText(file);inp.value='';
}
function clearData(){
  if(!confirm('تأكيد حذف جميع البيانات؟ لا يمكن التراجع!'))return;
  S={points:[],deliveries:[],leftovers:[],drivers:[],settlements:[],_ts:Date.now()};
  save();toast('تم مسح جميع البيانات');render();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
injectManifest();
regSW();
loadLocal();
applyTheme();
if(!DF.time)DF.time=nstr();
render();
</script>
</body>
</html>
